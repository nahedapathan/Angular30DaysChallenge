<div class="login-wrapper">
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p>Please login to Continue</p>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your Email"/>
        <small class="error" *ngIf="formControls['email'].touched && formControls['email'].errors?.['required']">
              Email is required
        </small>
        <small class="error" *ngIf="formControls['email'].touched && formControls['email'].errors?.['email']">
           Enter valid Email
        </small>
      </div>

      <div class="form-group">
         <label>Password</label>
         <input type="password" formControlName="password" placeholder="Enter Your Password"/>
         <small class="error" *ngIf="formControls['password'].touched && formControls['password'].errors?.['required']">
              Password is Required
         </small>
         <small class="error" *ngIf="formControls['password'].touched && formControls['password'].errors?.['minlength']">
             Password must minimum length 6
         </small>
      </div>

      <div class="forgot-password">
        <a href="#">Forgot Password</a>
      </div>

      <button type="submit">Login</button>
    </form>
  </div>
</div>
